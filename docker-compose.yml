# docker compose up -d alone should create the app network and all local data stores.
# No top-level "version" key is used because Compose V2 treats it as obsolete.

x-app-env: &app-env
  # The application reads these settings directly from app/config.py.
  MONGO_URI: mongodb://mongo:27017/fin_ai
  MONGO_DB: fin_ai
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: finagent123
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: fin_chunks
  DOCUMENT_COLLECTION: fin_chunks
  DATA_DIR: /app/data/csv

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    # Keep local secrets optional so a fresh clone can still start with defaults.
    - path: .env
      required: false
  environment: *app-env
  extra_hosts:
    # Ollama or other host-only services can still be reached from Linux containers.
    - host.docker.internal:host-gateway
  volumes:
    # app_data stores runtime files; ./data is mounted read-only for CSV ingest input.
    - app_data:/app/data
    - ./data:/app/data/csv:ro
  networks:
    - shared-net

x-app-dependencies: &app-dependencies
  mongo:
    condition: service_healthy
  redis:
    condition: service_healthy
  neo4j:
    condition: service_healthy
  qdrant:
    condition: service_healthy

x-ingest-dependencies: &ingest-dependencies
  # The CSV ingest job writes to MongoDB; it does not need the broker to start.
  mongo:
    condition: service_healthy

x-worker-dependencies: &worker-dependencies
  # Celery tasks touch Redis, MongoDB, Neo4j graph data, and Qdrant RAG indexes.
  mongo:
    condition: service_healthy
  redis:
    condition: service_healthy
  neo4j:
    condition: service_healthy
  qdrant:
    condition: service_healthy

x-beat-dependencies: &beat-dependencies
  # Beat only needs Redis available so it can publish scheduled Celery messages.
  redis:
    condition: service_healthy

services:
  mongo:
    image: mongo:7
    container_name: fin-ai-mongo
    restart: unless-stopped
    volumes:
      # MongoDB keeps application/auth/conversation data, so it must be persistent.
      - mongo_data:/data/db
    networks:
      - shared-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: fin-ai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      # Redis is used for sessions and Celery broker/results; AOF keeps them across restarts.
      - redis_data:/data
    networks:
      - shared-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  neo4j:
    image: neo4j:5.18-community
    container_name: fin-ai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/finagent123
    volumes:
      # Neo4j graph data is persistent application state.
      - neo4j_data:/data
    networks:
      - shared-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p finagent123 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fin-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Qdrant is used by crawl/rag/translation services, so vector indexes need persistence.
      - qdrant_data:/qdrant/storage
    networks:
      - shared-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    <<: *app-base
    container_name: fin-ai-app
    restart: unless-stopped
    ports:
      - "8966:8000"
    depends_on: *app-dependencies
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ingest:
    <<: *app-base
    container_name: fin-ai-ingest
    # This one-shot service loads CSV data after every required datastore is ready.
    entrypoint: ["python", "-m", "app.services.financial_ingest"]
    restart: "no"
    depends_on: *ingest-dependencies

  celery-worker:
    <<: *app-base
    container_name: fin-ai-celery-worker
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
    restart: unless-stopped
    depends_on: *worker-dependencies

  celery-beat:
    <<: *app-base
    container_name: fin-ai-celery-beat
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    restart: unless-stopped
    depends_on: *beat-dependencies

volumes:
  mongo_data:
  redis_data:
  neo4j_data:
  qdrant_data:
  app_data:

networks:
  shared-net:
    # Use the requested shared-net name, but let Compose create it automatically.
    name: shared-net
    driver: bridge
