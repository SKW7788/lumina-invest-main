# docker compose up -d 만으로 앱 네트워크와 로컬 데이터 저장소가 생성됩니다.
# Compose V2에서는 version 키가 deprecated라서 사용하지 않습니다.

x-app-env: &app-env
  # 애플리케이션은 app/config.py에서 아래 설정을 직접 읽습니다.
  MONGO_URI: mongodb://mongo:27017/fin_ai
  MONGO_DB: fin_ai
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: finagent123
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: fin_chunks
  DOCUMENT_COLLECTION: fin_chunks
  DATA_DIR: /app/data/csv

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    # 새로 클론한 환경에서도 기본값으로 실행할 수 있도록 로컬 비밀값 파일은 선택 사항으로 둡니다.
    - path: .env
      required: false
  environment: *app-env
  extra_hosts:
    # Linux 컨테이너에서 Ollama 같은 호스트 전용 서비스에 접근할 수 있게 합니다.
    - host.docker.internal:host-gateway
  volumes:
    # app_data는 런타임 파일을 저장하고, ./data는 CSV 수집 입력용으로 읽기 전용 마운트합니다.
    - app_data:/app/data
    - ./data:/app/data/csv:ro
  networks:
    - shared-net

x-app-dependencies: &app-dependencies
  mongo:
    condition: service_healthy
  redis:
    condition: service_healthy
  neo4j:
    condition: service_healthy
  qdrant:
    condition: service_healthy

x-ingest-dependencies: &ingest-dependencies
  # CSV 수집 작업은 MongoDB에만 기록하므로 브로커가 먼저 뜰 필요는 없습니다.
  mongo:
    condition: service_healthy

x-worker-dependencies: &worker-dependencies
  # Celery 작업은 Redis, MongoDB, Neo4j 그래프 데이터, Qdrant RAG 인덱스를 사용합니다.
  mongo:
    condition: service_healthy
  redis:
    condition: service_healthy
  neo4j:
    condition: service_healthy
  qdrant:
    condition: service_healthy

x-beat-dependencies: &beat-dependencies
  # Beat는 예약된 Celery 메시지를 발행하기 위해 Redis만 준비되면 됩니다.
  redis:
    condition: service_healthy

services:
  mongo:
    image: mongo:7
    container_name: fin-ai-mongo
    restart: unless-stopped
    volumes:
      # MongoDB는 애플리케이션, 인증, 대화 데이터를 보관하므로 영속 볼륨이 필요합니다.
      - mongo_data:/data/db
    networks:
      - shared-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: fin-ai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      # Redis는 세션과 Celery 브로커/결과 저장소로 사용되며, AOF로 재시작 후에도 데이터를 유지합니다.
      - redis_data:/data
    networks:
      - shared-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  neo4j:
    image: neo4j:5.18-community
    container_name: fin-ai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/finagent123
    volumes:
      # Neo4j 그래프 데이터는 애플리케이션의 영속 상태입니다.
      - neo4j_data:/data
    networks:
      - shared-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p finagent123 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fin-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Qdrant는 크롤링, RAG, 번역 서비스에서 사용하므로 벡터 인덱스를 영속화합니다.
      - qdrant_data:/qdrant/storage
    networks:
      - shared-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    <<: *app-base
    container_name: fin-ai-app
    restart: unless-stopped
    ports:
      - "8966:8000"
    depends_on: *app-dependencies
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ingest:
    <<: *app-base
    container_name: fin-ai-ingest
    # 필요한 데이터 저장소가 준비된 뒤 CSV 데이터를 적재하는 일회성 서비스입니다.
    entrypoint: ["python", "-m", "app.services.financial_ingest"]
    restart: "no"
    depends_on: *ingest-dependencies

  celery-worker:
    <<: *app-base
    container_name: fin-ai-celery-worker
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
    restart: unless-stopped
    depends_on: *worker-dependencies

  celery-beat:
    <<: *app-base
    container_name: fin-ai-celery-beat
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    restart: unless-stopped
    depends_on: *beat-dependencies

  dozzle:
    image: amir20/dozzle:latest
    container_name: fin-ai-dozzle
    ports:
      - "${DOZZLE_HTTP_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
    networks:
      - shared-net
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  neo4j_data:
  qdrant_data:
  app_data:

networks:
  shared-net:
    # shared-net 이름을 고정하되 네트워크 생성은 Compose에 맡깁니다.
    name: shared-net
    driver: bridge
